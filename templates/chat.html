{% extends "layout.html" %}
{% block title %}Chat del Equipo - PAIT{% endblock %}
{% block head_css %}
<style>
    /* Contenedor que se adapta al alto de la pantalla disponible */
    .chat-wrapper {
        height: calc(100vh - 150px); /* Ajusta según el alto de tu navbar/footer */
        display: flex;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
        margin-bottom: 20px;
    }

    /* Listado de mensajes con scroll */
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    /* Burbujas Estilizadas */
    .msg-bubble {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 15px;
        font-size: 0.9rem;
        position: relative;
    }

    .msg-others {
        align-self: flex-start;
        background: #e9ecef;
        color: #212529;
        border-bottom-left-radius: 2px;
    }

    .msg-me {
        align-self: flex-end;
        background: #007bff;
        color: #fff;
        border-bottom-right-radius: 2px;
    }

    .msg-info {
        font-size: 0.7rem;
        display: block;
        margin-bottom: 3px;
        font-weight: 600;
        opacity: 0.8;
    }

    /* Barra lateral de archivos */
    .chat-files-sidebar {
        width: 280px;
        border-left: 1px solid #dee2e6;
        background: #fff;
        display: none; /* Oculto en móvil */
    }

    @media (min-width: 992px) {
        .chat-files-sidebar { display: block; }
    }

    .file-card {
        padding: 8px;
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.85rem;
        transition: transform 0.2s;
    }

    .file-card:hover { transform: translateX(-5px); background: #f0f7ff; }
</style>
{% endblock %}
{% block content %}
<div class="container-fluid mt-3">
    <div class="chat-wrapper shadow-sm border-0">
        <div class="d-flex flex-column flex-grow-1">
            
            <div class="p-3 border-bottom bg-white d-flex align-items-center">
                <div class="icon-chat bg-primary text-white rounded-circle me-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    <i class="fa-solid fa-comments"></i>
                </div>
                <h6 class="mb-0 fw-bold">Canal del Equipo</h6>
            </div>

            <div class="chat-messages" id="chat_log">
                {% for h in historial %}
                    <div class="msg-bubble {{ 'msg-me' if h[0] == session['nombre'] else 'msg-others' }}">
                        <span class="msg-info">{{ 'Tú' if h[0] == session['nombre'] else h[0] }} • {{ h[2] }}</span>
                        <div class="msg-text">{{ h[1] }}</div>
                    </div>
                {% endfor %}
            </div>

            <div class="p-3 border-top bg-light">
                <form id="chat_form" class="input-group shadow-sm">
                    <input type="text" id="input_msg" class="form-control border-0 py-2 ps-3" 
                           placeholder="Escribe un mensaje..." maxlength="500">
                    <button class="btn btn-primary px-4" type="submit">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.socketio.io/4.0.0/socket.io.min.js"></script>
<script>
    // Conexión al servidor
    const socket = io();
    const idEquipo = "{{ equipo.id }}";
    const miNombre = "{{ session['nombre'] }}";
    const chatLog = document.getElementById('chat_log');
    const chatForm = document.getElementById('chat_form');

    // 1. Unirse a la sala del equipo al entrar
    socket.emit('join', { id_equipo: idEquipo });

    // 2. Escuchar mensajes nuevos
    socket.on('receive_message', function(data) {
        const esMio = (data.user === miNombre);
        agregarMensaje(data.user, data.msg, esMio);
    });

    // 3. Función para renderizar la burbuja en el log
    function agregarMensaje(usuario, mensaje, esMio) {
        const claseBubble = esMio ? 'msg-me' : 'msg-others';
        const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const nuevoMensaje = `
            <div class="msg-bubble ${claseBubble}">
                <span class="msg-info">${esMio ? 'Tú' : usuario} • ${hora}</span>
                <div class="msg-text">${mensaje}</div>
            </div>
        `;
        
        chatLog.innerHTML += nuevoMensaje;
        irAlFinal(); // Auto-scroll
    }

    // 4. Enviar mensaje desde el formulario
    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const input = document.getElementById('input_msg');
        const mensaje = input.value.trim();

        if (mensaje !== "") {
            socket.emit('send_message', { 
                id_equipo: idEquipo, 
                msg: mensaje 
            });
            input.value = ""; // Limpiar input
        }
    });

    // 5. Gestión del Scroll
    function irAlFinal() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Al cargar la página, bajar el scroll
    window.onload = irAlFinal;
</script>
{% endblock %}
